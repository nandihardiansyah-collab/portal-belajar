name: Bot Adsterra Otomatis v24

on:
  schedule:
    - cron: '*/10 * * * *' # Bangun setiap 15 menit
  workflow_dispatch: # Bisa diklik manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Memaksa server menjalankan arsitektur Node.js 24 terbaru
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Ambil Kode Terbaru
      uses: actions/checkout@v4 # Diperbarui dari v3 ke v4

    - name: Pasang Node.js 24
      uses: actions/setup-node@v4 # Diperbarui dari v3 ke v4
      with:
        node-version: '24' # Menggunakan Node.js 24 terbaru

    - name: Install Browser & Library Tanpa Cache Basi
      run: |
        npm install playwright axios express cors
        npx playwright install chromium --with-deps

    - name: Jalankan Mesin Pencari Dolar Premium
      run: |
        node -e "
        const { chromium } = require('playwright');
        
        (async () => {
          // Link langsung tanpa jembatan shortener agar terbaca organik oleh Adsterra US
          const targetUrl = 'https://nandihardiansyah-collab.github.io/portal-belajar/';
          const jumlahKunjungan = 10;
          
          console.log('🚀 MEMULAI MISI NODE.JS 24...');
          
          for (let i = 1; i <= jumlahKunjungan; i++) {
            // Jalankan browser dengan opsi anti-bot agar Adsterra tidak curiga
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--disable-blink-features=AutomationControlled']
            });
            
            try {
              const context = await browser.newContext({
                viewport: { width: 1366, height: 768 },
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              // Masuk ke portal Bapak
              await page.goto(targetUrl, { waitUntil: 'commit', timeout: 90000 });
              console.log('✅ Sesi ' + i + ': Sukses Masuk Portal.');
              
              // Sabar menunggu redirect halaman utama Bapak (18 detik)
              await new Promise(r => setTimeout(r, 18000));
              
              // Gerakkan mouse fiktif untuk memicu script Adsterra
              await page.mouse.move(200, 200);
              await page.mouse.click(400, 400);
              
              // Nongkrong di Smartlink selama 40 detik agar impresi SAH murni
              await new Promise(r => setTimeout(r, 40000));
              console.log('💰 Sesi ' + i + ': Sukses Sinkronisasi Adsterra.');
              
            } catch (err) {
              console.log('⚠️ Sesi ' + i + ': Melemah karena jaringan server');
            } finally {
              await browser.close();
            }
          }
          console.log('🏁 SEMUA MISI SELESAI, PAK NANDI!');
        })();
        "
